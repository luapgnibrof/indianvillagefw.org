name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Waynedale News feed
        run: |
          mkdir -p data
          python3 -c "
          import xml.etree.ElementTree as ET, json, urllib.request, re
          def norm(t):
              for a, b in [('\u2018',\"'\"),('\u2019',\"'\"),('\u201c','\"'),('\u201d','\"'),('\u2013','-'),('\u2014','-')]:
                  t = t.replace(a, b)
              return t
          req = urllib.request.Request('https://waynedalenews.com/feed/', headers={'User-Agent': 'IndianVillageNewsBot/1.0'})
          with urllib.request.urlopen(req, timeout=30) as resp:
              xml_data = resp.read()
          root = ET.fromstring(xml_data)
          items = []
          for item in root.findall('.//item')[:15]:
              title = norm(item.findtext('title', '').strip())
              link = item.findtext('link', '').strip()
              pub_date = item.findtext('pubDate', '').strip()
              m = re.search(r'\d{1,2} \w{3} \d{4}', pub_date)
              date_short = m.group(0) if m else ''
              items.append({'title': title, 'link': link, 'date': date_short})
          with open('data/waynedale_feed.json', 'w', encoding='utf-8') as f:
              json.dump({'items': items}, f, indent=2)
          print(f'Saved {len(items)} feed items')
          "

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Indiana/Indianapolis
        run: |
          hugo \
            --gc \
            --minify \
            --buildFuture

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
