<header class="site-header">
  <div class="header-inner">
    <div class="site-branding">
      <a href="{{ "/" | relURL }}">
        <h1 class="site-title">{{ .Site.Title }}</h1>
        <p class="site-subtitle">{{ .Site.Params.subtitle }}</p>
      </a>
    </div>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">Menu</button>
    <nav class="main-nav">
      <ul class="nav-menu">
        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
          <li class="has-children">
            <a href="{{ .URL }}" aria-haspopup="true" aria-expanded="false">{{ .Name }}</a>
            <ul class="sub-menu">
              {{ range .Children }}
              <li><a href="{{ .URL }}"{{ with .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a></li>
              {{ end }}
            </ul>
          </li>
          {{ else }}
          <li><a href="{{ .URL }}"{{ with .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
