<section class="widget newsletter-signup">
  <h3>Subscribe to Important Newsletters</h3>
  <form action="{{ .Site.Params.mailchimp.actionURL }}" method="post" target="_blank">
    <label for="mce-EMAIL">Email Address</label>
    <input type="email" name="EMAIL" id="mce-EMAIL" required placeholder="you@example.com">
    <button type="submit">Subscribe</button>
  </form>
</section>
