{{ define "main" }}
<article class="single-post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.author }}| <span class="author">{{ . }}</span>{{ end }}
      {{ with .Params.categories }}| {{ range . }}<a href="{{ "categories/" | relURL }}{{ . | urlize }}/" class="category">{{ . }}</a> {{ end }}{{ end }}
    </div>
  </header>
  <div class="post-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
